<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #fafafa; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; width: 300px; }
        img { width: 50px; margin-bottom: 20px; }
        input { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #24292e; color: white; border: none; border-radius: 4px; cursor: pointer; opacity: 0.5; }
        button.active { opacity: 1; }
        button.active:hover { background: #000; }
    </style>
</head>
<body>
    <div class="card">
        <!-- GitHub Logo -->
        <svg viewBox="0 0 16 16" width="50" height="50" fill="#24292e" style="margin-bottom:20px;"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path></svg>
        <h3 style="margin-top:0;">Import GitHub App</h3>
        <p style="font-size:12px; color:#666;">Enter a user/repo that has GitHub Pages enabled. The repository will run natively in an iframe.</p>
        <input type="text" id="repo" placeholder="user/repo OR full URL" oninput="checkInput()">
        <button id="btn" onclick="importRepo()" disabled>Import Repository</button>
    </div>

    <script>
        const input = document.getElementById('repo');
        const btn = document.getElementById('btn');

        function checkInput() {
            if(input.value.trim().length > 3) {
                btn.classList.add('active');
                btn.removeAttribute('disabled');
            } else {
                btn.classList.remove('active');
                btn.setAttribute('disabled', 'true');
            }
        }

        function importRepo() {
            let val = input.value.trim();
            let url = '';
            
            if(val.startsWith('http')) {
                url = val;
            } else {
                const parts = val.split('/');
                if(parts.length >= 2) {
                    url = `https://${parts[0]}.github.io/${parts[1]}/`;
                } else {
                    alert('Invalid format. Use user/repo'); return;
                }
            }
            
            // Send the URL back to OS to open in a window
            window.parent.openWindow(val + ' - GitHub', url);
        }
    </script>
</body>
</html>
