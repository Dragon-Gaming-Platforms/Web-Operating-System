<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; background: #202020; color: #fff; display: flex; flex-direction: column; height: 100vh; }
        
        /* Setup Screen */
        #setup-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding: 20px; text-align: center; }
        .setup-box { background: #2d2d2d; padding: 30px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); max-width: 400px; width: 100%; box-shadow: 0 10px 30px rgba(0,0,0,0.5);}
        .setup-box input { width: 100%; padding: 12px; margin-bottom: 15px; background: #111; color: white; border: 1px solid #444; border-radius: 4px; box-sizing: border-box; outline: none; }
        .setup-box input:focus { border-color: var(--accent, #0078D4); }
        .setup-box button { width: 100%; padding: 12px; background: var(--accent, #0078D4); color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        
        /* Chat UI */
        #chat-ui { display: none; flex-direction: column; height: 100%; }
        #chat-window { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 80%; padding: 12px 16px; border-radius: 8px; line-height: 1.4; font-size: 14px; word-wrap: break-word; }
        .user-msg { background: var(--accent, #0078D4); align-self: flex-end; border-bottom-right-radius: 2px; }
        .ai-msg { background: #333; align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid rgba(255,255,255,0.1); }
        #input-area { padding: 15px; background: #191919; border-top: 1px solid rgba(255,255,255,0.1); display: flex; gap: 10px; }
        #input-area input { flex: 1; background: #111; color: white; border: 1px solid #444; padding: 12px; border-radius: 20px; outline: none; }
        #input-area input:focus { border-color: var(--accent, #0078D4); }
        #input-area button { background: var(--accent, #0078D4); color: white; border: none; padding: 0 20px; border-radius: 20px; cursor: pointer; font-weight: bold; transition: 0.2s;}
        .typing { font-style: italic; color: #aaa; font-size: 12px; align-self: flex-start; margin-left: 10px; display: none;}
    </style>
</head>
<body>

    <!-- First Time Setup Screen -->
    <div id="setup-screen">
        <div class="setup-box">
            <h2>Secure AI Login</h2>
            <p style="font-size: 12px; color: #aaa; margin-bottom: 20px;">Connect to your private Google Sheets Backend.</p>
            <input type="text" id="backend-url" placeholder="Google Web App URL (Starts with https://script.google.com...)">
            <input type="password" id="backend-password" placeholder="Your Custom Password">
            <button onclick="saveSetup()">Connect Backend</button>
        </div>
    </div>

    <!-- Main Chat UI -->
    <div id="chat-ui">
        <div id="chat-window">
            <div class="message ai-msg">
                🔒 Connected securely to your private database.<br>Your usage is being logged in Google Sheets. How can I help you?
            </div>
        </div>
        <div class="typing" id="typing-indicator">Communicating with private server...</div>
        
        <div id="input-area">
            <input type="text" id="chat-input" placeholder="Type a message..." autocomplete="off">
            <button id="send-btn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const setupScreen = document.getElementById('setup-screen');
        const chatUI = document.getElementById('chat-ui');
        const chatWindow = document.getElementById('chat-window');
        const input = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        const typing = document.getElementById('typing-indicator');

        // Check if already configured
        let BACKEND_URL = localStorage.getItem('ai_backend_url');
        let BACKEND_PASS = localStorage.getItem('ai_backend_pass');

        if (BACKEND_URL && BACKEND_PASS) {
            setupScreen.style.display = 'none';
            chatUI.style.display = 'flex';
        }

        function saveSetup() {
            const url = document.getElementById('backend-url').value.trim();
            const pass = document.getElementById('backend-password').value.trim();
            if (!url || !pass) return alert('Please enter both the URL and Password.');
            
            localStorage.setItem('ai_backend_url', url);
            localStorage.setItem('ai_backend_pass', pass);
            
            BACKEND_URL = url;
            BACKEND_PASS = pass;
            
            setupScreen.style.display = 'none';
            chatUI.style.display = 'flex';
        }

        input.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });

        let messages = [
            { role: "system", content: "You are a helpful AI assistant. Format answers clearly using HTML formatting tags like <b>, <i>, and <br>." }
        ];

        async function sendMessage() {
            const text = input.value.trim();
            if (!text) return;

            appendMessage(text, 'user-msg');
            input.value = '';
            input.disabled = true;
            sendBtn.disabled = true;
            typing.style.display = 'block';

            messages.push({ role: "user", content: text });

            try {
                // We send the request as text/plain to bypass complex CORS preflight issues
                const response = await fetch(BACKEND_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({
                        password: BACKEND_PASS,
                        messages: messages
                    })
                });

                const data = await response.json();
                
                if (data.error) {
                    appendMessage("❌ " + data.error, 'ai-msg');
                    // If wrong password, prompt reset
                    if(data.error.includes("Access Denied")) {
                        localStorage.removeItem('ai_backend_pass');
                        setTimeout(() => location.reload(), 2000);
                    }
                } else {
                    const aiText = data.reply;
                    messages.push({ role: "assistant", content: aiText });
                    
                    const formattedText = aiText.replace(/```([\s\S]*?)```/g, '<pre style="background:#000;padding:10px;border-radius:4px;overflow-x:auto;"><code>$1</code></pre>')
                                                .replace(/\n/g, '<br>');

                    appendMessage(formattedText, 'ai-msg', true);
                }

            } catch (err) {
                appendMessage("❌ Network Error connecting to Backend.", 'ai-msg');
            }

            input.disabled = false; sendBtn.disabled = false; typing.style.display = 'none'; input.focus();
        }

        function appendMessage(content, className, isHTML = false) {
            const div = document.createElement('div');
            div.className = `message ${className}`;
            if (isHTML) div.innerHTML = content;
            else div.innerText = content;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }
    </script>
</body>
</html>
